<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kubernetes Demo</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background: white;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, .15);
                text-align: center;
            }

            h1 {
                color: #1976d2;
            }

            p {
                color: #555;
            }
        </style>
    </head>

    <body>

        <div class="card">
            <h1>Hello Kubernetes 👋</h1>
            <p>This page is running inside Kubernetes.</p>
        </div>

    </body>

</html>
