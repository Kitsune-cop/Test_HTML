apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2

  selector:
    matchLabels:
      app: html-demo

  template:
    metadata:
      labels:
        app: html-demo

    spec:
      containers:
      - name: nginx
        image: registry.example.com/demo/html-demo:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  selector:
    app: html-demo
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort